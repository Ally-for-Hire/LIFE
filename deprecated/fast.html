<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIFE Fast Runner</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0d1013;
    --panel: #161a20;
    --panel-2: #202630;
    --line: #303946;
    --line-soft: #252c35;
    --text: #e0e5eb;
    --muted: #8d97a4;
    --green: #49b86f;
    --gold: #d7b84c;
    --red: #d86161;
    --blue: #5a9bd8;
    --cyan: #53b4ba;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #0d1013;
    color: var(--text);
    font-family: Inter, "Segoe UI", system-ui, sans-serif;
  }
  #app {
    min-height: 100vh;
    display: grid;
    grid-template-columns: minmax(520px, 1fr) 420px;
    gap: 14px;
    padding: 14px;
  }
  #stage {
    min-width: 0;
  }
  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 11px 12px;
    border: 1px solid var(--line);
    background: var(--panel);
    margin-bottom: 12px;
    border-radius: 8px;
  }
  h1 {
    margin: 0;
    font-size: 18px;
    letter-spacing: 0;
    font-weight: 650;
  }
  #summary {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    color: var(--muted);
    font-size: 12px;
  }
  .pill {
    border: 1px solid var(--line-soft);
    background: #11161c;
    border-radius: 999px;
    padding: 3px 8px;
    white-space: nowrap;
  }
  canvas {
    width: 100%;
    max-height: calc(100vh - 88px);
    aspect-ratio: 1;
    image-rendering: pixelated;
    background: #111418;
    border: 1px solid var(--line);
    border-radius: 8px;
    display: block;
  }
  #side {
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-width: 0;
  }
  section {
    border: 1px solid var(--line);
    background: var(--panel);
    padding: 11px;
    border-radius: 8px;
  }
  h2 {
    margin: 0 0 10px;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0;
  }
  .row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }
  button {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 7px 10px;
    font: inherit;
    font-size: 12px;
    cursor: pointer;
  }
  button:hover { border-color: #657386; }
  button.active {
    background: var(--green);
    border-color: var(--green);
    color: #08110b;
  }
  button.warn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: #171304;
  }
  label {
    display: grid;
    grid-template-columns: 1fr 90px;
    gap: 8px;
    align-items: center;
    margin: 7px 0;
    color: var(--muted);
    font-size: 12px;
  }
  input {
    width: 100%;
    background: #111418;
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 5px;
    padding: 5px 6px;
    font: 12px ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
  }
  .stats {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 6px 10px;
    font-size: 12px;
  }
  .stats div {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    border-bottom: 1px solid var(--line-soft);
    padding-bottom: 3px;
  }
  .stats span:first-child { color: var(--muted); }
  .list {
    display: grid;
    gap: 4px;
    max-height: 230px;
    overflow: auto;
  }
  .item {
    display: grid;
    grid-template-columns: 42px minmax(86px, 1fr) 58px 58px 72px;
    gap: 7px;
    align-items: center;
    padding: 5px 6px;
    background: #13171c;
    border: 1px solid var(--line-soft);
    border-radius: 6px;
    font-size: 12px;
  }
  .swatch {
    width: 10px;
    height: 10px;
    display: inline-block;
    border: 1px solid rgba(255,255,255,0.35);
    margin-right: 5px;
  }
  .muted { color: var(--muted); }
  .good { color: var(--green); }
  .bad { color: var(--red); }
  .num { font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace; }
  @media (max-width: 980px) {
    #app { grid-template-columns: 1fr; }
    canvas { max-height: none; }
  }
</style>
</head>
<body>
<div id="app">
  <main id="stage">
    <div id="topbar">
      <h1>LIFE Fast Runner</h1>
      <div id="summary"></div>
    </div>
    <canvas id="world" width="768" height="768"></canvas>
  </main>
  <aside id="side">
    <section>
      <h2>Simulation</h2>
      <div class="row">
        <button id="sim-toggle">Run</button>
        <button id="step-1k">Step 1k</button>
        <button id="step-10k">Step 10k</button>
      </div>
      <label>Ticks per batch <input id="ticks-batch" type="number" min="1" max="50000" value="2000"></label>
      <div class="stats" id="sim-stats"></div>
    </section>

    <section>
      <h2>Populate</h2>
      <label>Trees <input id="pop-trees" type="number" min="0" value="55"></label>
      <label>Entities <input id="pop-entities" type="number" min="0" value="40"></label>
      <label>Leaders <input id="pop-leaders" type="number" min="0" value="4"></label>
      <label>Resources <input id="pop-resources" type="number" min="0" value="60"></label>
      <div class="row">
        <button id="populate">Populate Fresh</button>
      </div>
    </section>

    <section>
      <h2>Training</h2>
      <div class="row">
        <button id="train-toggle" class="warn">Train</button>
        <button id="run-generation">Run Gen</button>
        <button id="reset-training">Reset</button>
        <button id="seed-best">Seed Best</button>
      </div>
      <label>Worker threads <input id="worker-count" type="number" min="1" max="64" value="8"></label>
      <label>Train ticks per batch <input id="train-batch" type="number" min="1" max="50000" value="5000"></label>
      <div class="stats" id="train-stats"></div>
    </section>

    <section>
      <h2>Clans</h2>
      <div class="list" id="clan-list"></div>
    </section>

    <section>
      <h2>Leader League</h2>
      <div class="list" id="league-list"></div>
    </section>
  </aside>
</div>
<script src="/js/fast-client.js"></script>
</body>
</html>
